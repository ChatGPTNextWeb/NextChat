name: Deploy NextChat to Cloudflare Pages

# このファイルを NextChat (フォーク後の) リポジトリの .github/workflows/deploy.yml
# として配置してください。main への push で自動デプロイされます。

on:
  push:
    branches: [main]
  workflow_dispatch: {} # 手動実行用

# 同時実行を1つに制限（Pages側の競合デプロイ防止）
concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

env:
  NODE_VERSION: "20.1"
  # Cloudflare Pages のプロジェクト名。Terraform の cloudflare_pages_project.name と一致させること
  CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME || 'nextchat' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # NextChat はバージョンによって yarn / pnpm いずれかを使用しているため
      # ロックファイルを見て自動判定する
      - name: Detect package manager
        id: pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable Corepack (pnpm/yarn)
        if: steps.pm.outputs.manager != 'npm'
        run: corepack enable

      - name: Install dependencies
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            npm)  npm ci ;;
          esac

      # NextChat 公式ドキュメント推奨のビルドコマンド。
      # 通常の `next build` は node:buffer 関連の既知バグで Pages 上で動作しないため使用しない。
      - name: Build for Cloudflare Pages (next-on-pages)
        run: npx @cloudflare/next-on-pages --experimental-minify
        env:
          NEXT_TELEMETRY_DISABLE: "1"
          # --- NextChat 実行時設定（必要に応じて GitHub Secrets/Variables を追加） ---
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_ORG_ID: ${{ secrets.OPENAI_ORG_ID }}
          CODE: ${{ secrets.NEXTCHAT_ACCESS_CODE }}
          HIDE_USER_API_KEY: ${{ vars.HIDE_USER_API_KEY }}
          DISABLE_GPT4: ${{ vars.DISABLE_GPT4 }}
          ENABLE_BALANCE_QUERY: ${{ vars.ENABLE_BALANCE_QUERY }}
          DISABLE_FAST_LINK: ${{ vars.DISABLE_FAST_LINK }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=${{ env.CF_PAGES_PROJECT_NAME }} --branch=main

      # OPENAI_API_KEY等はビルド成果物に含めず、Pages Functionsの実行時
      # シークレットとして直接登録する（Terraformのstateにも残らない）
      #
      # 注: GitHub Actionsの仕様上 `secrets` コンテキストは if: 条件式では使えない
      # ("Unrecognized named-value: 'secrets'" エラーの原因）。そのためステップ自体は
      # 常に実行し、各シークレットの有無はステップ内のシェルスクリプトでチェックする。
      - name: Sync runtime secrets to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_ORG_ID: ${{ secrets.OPENAI_ORG_ID }}
          NEXTCHAT_ACCESS_CODE: ${{ secrets.NEXTCHAT_ACCESS_CODE }}
        run: |
          set -e
          if [ -n "$OPENAI_API_KEY" ]; then
            printf '%s' "$OPENAI_API_KEY" | npx wrangler pages secret put OPENAI_API_KEY \
              --project-name="${{ env.CF_PAGES_PROJECT_NAME }}"
          fi
          if [ -n "$OPENAI_ORG_ID" ]; then
            printf '%s' "$OPENAI_ORG_ID" | npx wrangler pages secret put OPENAI_ORG_ID \
              --project-name="${{ env.CF_PAGES_PROJECT_NAME }}"
          fi
          if [ -n "$NEXTCHAT_ACCESS_CODE" ]; then
            printf '%s' "$NEXTCHAT_ACCESS_CODE" | npx wrangler pages secret put CODE \
              --project-name="${{ env.CF_PAGES_PROJECT_NAME }}"
          fi
